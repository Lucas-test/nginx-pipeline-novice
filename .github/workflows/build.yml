name: Build and test Nginx

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier la présence des fichiers
        run: |
          test -f index.html
          test -f nginx.conf
          test -f Dockerfile

      - name: Construire l'image Docker
        run: docker build -t nginx-test .

      - name: Tester la configuration Nginx
        run: docker run --rm nginx-test nginx -t